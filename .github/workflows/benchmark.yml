name: benchmark

# Builds a version-pinned Docker image per language and measures deterministic
# instruction counts UNIFORMLY under qemu-user + the TCG `insn` plugin, for EVERY
# benchmark under benchmarks/. GitHub runners are amd64 → results tagged isa=x86_64.
on:
  push:
    branches: [main]
    paths:
      - "versions.lock.json"
      - "languages.json"
      - "languages/**"
      - "benchmarks/**"
      - "scripts/measure.sh"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Cells that genuinely can't be measured on the free x86_64 runner (e.g. the CLR crashing/OOMing
  # under qemu-user for csharp/k-nucleotide at n2 — measures fine on arm64). A failure here is
  # RECORDED as an unmeasured cell ({"measured": false}) and the run stays green; a failure for any
  # cell NOT listed here still fails the job, so real regressions are not masked. Format "lang:bench".
  # scala/message-ring: measures fine on arm64 but emits no instruction count under qemu-x86_64
  # (run exits 0, no plugin summary — cause undiagnosed; run /backend-doctor on an x86_64 host).
  ALLOW_NOMEASURE: "csharp:k-nucleotide scala:message-ring"

# Serialize runs so the collect job's commit/push to main can't race.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build qemu-insn base (once, shared with the matrix)
        run: |
          docker build -f languages/_base/Dockerfile.qemu-insn -t lang-lab-qemu-insn .
          docker save lang-lab-qemu-insn | gzip > qemu-insn.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: qemu-insn-base
          path: qemu-insn.tar.gz

  # The language list is DERIVED from languages.json (the single registry), so adding a
  # language there is enough: no hand-maintained matrix copy to forget.
  langs:
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.keys.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - id: keys
        run: echo "list=$(jq -c 'keys' languages.json)" >> "$GITHUB_OUTPUT"

  matrix:
    needs: [base, langs]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.langs.outputs.list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: qemu-insn-base
      - name: Load qemu-insn base
        run: gunzip -c qemu-insn.tar.gz | docker load

      - name: Read registry
        id: reg
        run: |
          L='${{ matrix.language }}'
          echo "version=$(jq -r --arg l "$L" '.[$l]' versions.lock.json)" >> "$GITHUB_OUTPUT"
          echo "arg=$(jq -r --arg l "$L" '.[$l].buildArg' languages.json)" >> "$GITHUB_OUTPUT"
          echo "kind=$(jq -r --arg l "$L" '.[$l].runtimeKind // "native"' languages.json)" >> "$GITHUB_OUTPUT"

      - name: Build image (compiles every benchmark for this language)
        run: |
          docker build -f "languages/${{ matrix.language }}/Dockerfile" \
            --build-arg "${{ steps.reg.outputs.arg }}=${{ steps.reg.outputs.version }}" \
            -t "lang-lab-${{ matrix.language }}" .

      - name: Measure every benchmark (qemu+insn, adaptive RUNS)
        # measure.sh now probes 2 reps and escalates to 5 only on jitter (bit-exact langs are
        # proven deterministic in 2).
        # N1/N2 and the checksum gates are spec-driven per benchmark; measure.sh
        # appends the size itself. The `run` template's {b} is the benchmark name;
        # elixir wraps it so beam.smp runs directly (launchWrap).
        run: |
          L='${{ matrix.language }}'
          KIND='${{ steps.reg.outputs.kind }}'
          VER='${{ steps.reg.outputs.version }}'
          RUN_TMPL=$(jq -r --arg l "$L" '.[$l].run' languages.json)
          WRAP=$(jq -r --arg l "$L" '.[$l].launchWrap // false' languages.json)
          envflags=()
          while IFS=$'\t' read -r k v; do [ -n "$k" ] && envflags+=(-e "$k=$v"); done < <(
            jq -r --arg l "$L" '.[$l].runtimeEnv // {} | to_entries[] | "\(.key)\t\(.value)"' languages.json)
          for spec in benchmarks/*/spec.json; do
            b=$(jq -r .benchmark "$spec")
            # spec-declared N/A cells (e.g. message-ring for perl) are skipped entirely
            if jq -e --arg l "$L" '.na // [] | index($l)' "$spec" >/dev/null; then
              echo "skip $L/$b (N/A per spec: $(jq -r '.naReason // ""' "$spec"))"
              continue
            fi
            n1=$(jq -r .n1 "$spec"); n2=$(jq -r .n2 "$spec")
            c1=$(jq -r '.checksums.n1.sum' "$spec"); s1=$(jq -r '.checksums.n1.secondary // ""' "$spec")
            c2=$(jq -r '.checksums.n2.sum' "$spec"); s2=$(jq -r '.checksums.n2.secondary // ""' "$spec")
            runcmd="${RUN_TMPL//\{b\}/$b}"
            if [ "$WRAP" = "true" ]; then
              override=(sh -c "set -a; . /app/beam-launch; exec /usr/local/bin/measure.sh $L $b -- $runcmd")
            else
              override=(/usr/local/bin/measure.sh "$L" "$b" -- $runcmd)
            fi
            echo "::group::measure $L / $b"
            # A cell can fail to emit a count (e.g. the CLR crashing/OOMing under qemu-x86_64).
            # If it's allow-listed in ALLOW_NOMEASURE, record it as an unmeasured cell and carry
            # on (run stays green); otherwise fail the job so real regressions still surface.
            rc=0
            docker run --rm \
              -e RUNTIME_KIND="$KIND" -e N1="$n1" -e N2="$n2" \
              -e CHECK1_SUM="$c1" -e CHECK1_FLIPS="$s1" -e CHECK2_SUM="$c2" -e CHECK2_FLIPS="$s2" \
              ${envflags[@]+"${envflags[@]}"} "lang-lab-$L" "${override[@]}" > "result-$L-$b.json" 2> "err-$L-$b.txt" || rc=$?
            if [ "$rc" -ne 0 ]; then
              allowed=0
              for a in ${ALLOW_NOMEASURE:-}; do [ "$a" = "$L:$b" ] && allowed=1; done
              reason=$(tail -n 3 "err-$L-$b.txt" | tr '\n' ' ')
              if [ "$allowed" = 1 ]; then
                echo "::warning::$L/$b unmeasurable on x86_64 (exit $rc) — recorded as skipped: $reason"
                jq -n --arg l "$L" --arg b "$b" --arg ver "$VER" --arg k "$KIND" \
                   --arg note "not measured on x86_64 (exit $rc): $reason" \
                   '{language:$l, benchmark:$b, version:$ver, backend:"qemu-insn",
                     metric:"instructions", kind:$k, measured:false, note:$note}' \
                   > "result-$L-$b.json"
              else
                echo "::error::$L/$b failed to measure (exit $rc); not in ALLOW_NOMEASURE"
                cat "err-$L-$b.txt" >&2
                exit "$rc"
              fi
            fi
            cat "result-$L-$b.json"
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: "result-${{ matrix.language }}"
          path: "result-${{ matrix.language }}-*.json"

  collect:
    needs: matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge results into per-(isa, benchmark) envelopes
        run: |
          mkdir -p results
          stamp="$(date -u +%Y-%m-%d)"; isa=x86_64   # GitHub runners are amd64
          for spec in benchmarks/*/spec.json; do
            b=$(jq -r .benchmark "$spec")
            n1=$(jq -r .n1 "$spec"); n2=$(jq -r .n2 "$spec")
            files=(artifacts/*/result-*-"$b".json)
            [ -e "${files[0]}" ] || { echo "no results for $b - skipping"; continue; }
            # envelope-level runs = the max any cell actually ran (adaptive RUNS: 2 or 5)
            jq -s --arg b "$b" --arg date "$stamp" --arg isa "$isa" \
               --argjson n1 "$n1" --argjson n2 "$n2" --slurpfile spec "$spec" \
               '{benchmark:$b, date:$date, backend:"qemu-insn", isa:$isa,
                 n1:$n1, n2:$n2, runs:(map(.runs // empty) | max),
                 checksums:$spec[0].checksums, results: .}' \
               "${files[@]}" > "results/${stamp}-${isa}-${b}.json"
            # Per-(ISA, benchmark) "latest" so an x86_64 run never mixes the arm64 history.
            cp "results/${stamp}-${isa}-${b}.json" "results/latest-${isa}-${b}.json"
          done

      - name: Regenerate charts (one set per benchmark)
        # make_charts.py writes non-arm64 envelopes into docs/charts/x86_64/, so this refresh can
        # never overwrite the arm64 charts embedded by the README + study READMEs.
        run: |
          for f in results/latest-x86_64-*.json; do
            echo "charts for $f"; python3 scripts/make_charts.py "$f"
          done

      - name: Commit results + charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results docs/charts
          git commit -m "data: benchmark run ${GITHUB_SHA::7}" || { echo "no changes"; exit 0; }
          git pull --rebase origin main && git push
